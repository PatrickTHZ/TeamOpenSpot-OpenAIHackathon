name: Build Android APK

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle -p backend/android assembleDebug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist/android
          cp backend/android/app/build/outputs/apk/debug/app-debug.apk dist/android/trustlens-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: trustlens-debug-apk
          path: dist/android/trustlens-debug.apk

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/android/trustlens-debug.apk
