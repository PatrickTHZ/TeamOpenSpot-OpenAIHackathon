services:
  trustlens-backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: trustlens-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5072
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_TIMEOUT_MS: ${OPENAI_TIMEOUT_MS:-2500}
      OPENAI_ENABLE_VISION: ${OPENAI_ENABLE_VISION:-false}
      MAX_REQUEST_BYTES: ${MAX_REQUEST_BYTES:-3500000}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_LANG: ${OCR_LANG:-eng}
      OCR_TIMEOUT_MS: ${OCR_TIMEOUT_MS:-3000}
      WEB_VERIFICATION_ENABLED: ${WEB_VERIFICATION_ENABLED:-false}
      WEB_VERIFICATION_TIMEOUT_MS: ${WEB_VERIFICATION_TIMEOUT_MS:-6000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      EVIDENCE_STORAGE_ENABLED: ${EVIDENCE_STORAGE_ENABLED:-false}
      EVIDENCE_STORAGE_DIR: ${EVIDENCE_STORAGE_DIR:-/data/evidence}
      EVIDENCE_STORE_RAW_TEXT: ${EVIDENCE_STORE_RAW_TEXT:-false}
      EVIDENCE_HASH_SALT: ${EVIDENCE_HASH_SALT:-change-me}
      EVIDENCE_ADMIN_TOKEN: ${EVIDENCE_ADMIN_TOKEN:-}
      ASSESSMENT_LOG_DETAIL: ${ASSESSMENT_LOG_DETAIL:-debug}
    ports:
      - "5072:5072"
    volumes:
      - trustlens-evidence:/data/evidence
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5072/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  trustlens-evidence:

