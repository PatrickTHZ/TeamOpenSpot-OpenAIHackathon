services:
  trustlens-backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: trustlens-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5072
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "5072:5072"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5072/v1/assess',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({client:'chrome',url:'https://example.com'})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

